name: NALA DA-Marketo

on:
  pull_request:
    branches: [main, stage]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      BASE_URL:
        description: 'Base URL for tests (e.g. https://main--da-bacom--adobecom.aem.live)'
        required: false
      MARKETO_LIBS:
        description: 'da-marketo branch to load via ?marketolibs= (e.g. bmarshal-marketolibs)'
        required: false

concurrency:
  group: nala-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Set MARKETO_LIBS
        run: |
          if [ -n "${{ inputs.MARKETO_LIBS }}" ]; then
            echo "MARKETO_LIBS=${{ inputs.MARKETO_LIBS }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "MARKETO_LIBS=$(echo '${{ github.head_ref }}' | tr '/' '-')" >> $GITHUB_ENV
          fi

      - name: Run NALA tests
        run: npm run test:nala
        env:
          BASE_URL: ${{ inputs.BASE_URL }}

      - name: Upload results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nala-results-${{ github.run_id }}
          path: nala/results/
          retention-days: 14
          if-no-files-found: ignore
