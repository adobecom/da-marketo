userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

projectName: da-marketo
buildName: da-marketo-nala
buildIdentifier: '#${BUILD_NUMBER}_${DATE_TIME}'

platforms:
  - os: OS X
    osVersion: Sonoma
    browserName: playwright-webkit
    browserVersion: latest

  - os: OS X
    osVersion: Sequoia
    browserName: chrome
    browserVersion: latest

  - os: Windows
    osVersion: 11
    browserName: chrome
    browserVersion: latest

  - os: Windows
    osVersion: 11
    browserName: playwright-firefox
    browserVersion: latest

parallelsPerPlatform: 1

browserstackLocal: false
testObservability: true
networkLogs: true
consoleLogs: errors
